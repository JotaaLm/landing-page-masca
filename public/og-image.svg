<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Masca - agente de vendas no WhatsApp</title>
  <desc id="desc">Imagem social do Masca, IA para atendimento, vendas e pedidos pelo WhatsApp.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ef" />
      <stop offset="1" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6a1a" />
      <stop offset="1" stop-color="#ff9b57" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#814318" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <path d="M0 452C154 395 250 424 388 478C556 544 715 559 870 482C1016 410 1094 392 1200 431V630H0V452Z" fill="#fff0e6" />
  <circle cx="1028" cy="105" r="190" fill="#ff6a1a" opacity="0.08" />
  <circle cx="135" cy="515" r="210" fill="#246bfe" opacity="0.07" />

  <g transform="translate(74 64)">
    <g transform="scale(.12)" fill="none" stroke="#ff6a1a" stroke-linejoin="round">
      <path d="M150 475V375C150 225 283 225 350 325L450 475C517 575 650 575 650 475V375C650 225 517 225 450 325L350 475C283 575 150 575 150 475Z" stroke-width="90" />
      <path d="M359 338.5L441 461.5" stroke-width="90" />
    </g>
    <text x="112" y="64" fill="#20242d" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800">Masca</text>
  </g>

  <g transform="translate(76 186)">
    <text x="0" y="0" fill="#e84f00" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" letter-spacing="2">IA DE VENDAS PARA WHATSAPP</text>
    <text x="0" y="76" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900">Venda 24/7</text>
    <text x="0" y="154" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900">sem perder pedidos</text>
    <text x="0" y="220" fill="#596174" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600">Atende, recomenda produtos, monta pedidos</text>
    <text x="0" y="262" fill="#596174" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600">e organiza estoque e delivery.</text>
  </g>

  <g transform="translate(790 132)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="380" rx="34" fill="#ffffff" stroke="#f0dfd2" />
    <rect x="30" y="34" width="170" height="18" rx="9" fill="#ff6a1a" opacity="0.26" />
    <circle cx="276" cy="43" r="11" fill="#16a36a" />
    <rect x="30" y="92" width="246" height="66" rx="20" fill="#f2f5fa" />
    <text x="55" y="133" fill="#596174" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Tem entrega hoje?</text>
    <rect x="74" y="184" width="226" height="96" rx="24" fill="url(#accent)" />
    <text x="102" y="224" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Sim. Posso montar</text>
    <text x="102" y="252" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">seu pedido agora.</text>
    <rect x="30" y="316" width="86" height="34" rx="17" fill="#171717" />
    <rect x="126" y="316" width="86" height="34" rx="17" fill="#fff3e8" />
    <rect x="222" y="316" width="78" height="34" rx="17" fill="#fff3e8" />
  </g>
</svg>
